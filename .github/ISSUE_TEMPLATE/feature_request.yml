name: ✨ 기능 제안
description: 새로운 기능, 개선, 또는 변경 제안.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        먼저 [extensible-plan](https://github.com/jaehoonE7877/rubrix/blob/main/docs/extensible-plan.md)에 이미 계획된 항목인지 확인해주세요.

  - type: textarea
    id: motivation
    attributes:
      label: 어떤 문제를 해결하고 싶으신가요?
      description: 현재 Rubrix로 무엇을 하기 어려운지 구체적으로 적어주세요.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      description: 어떤 동작을 추가/변경하고 싶은지. CLI 옵션, schema 필드, hook 동작 등 구체적일수록 좋습니다.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 검토한 대안 (선택)
