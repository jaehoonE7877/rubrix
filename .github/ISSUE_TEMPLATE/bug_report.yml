name: 🐞 버그 리포트
description: Rubrix에서 발견한 버그를 알려주세요.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        보안 취약점은 공개 issue 대신 [SECURITY 정책](https://github.com/jaehoonE7877/rubrix/blob/main/.github/SECURITY.md)에 따라 비공개로 알려주세요.

  - type: textarea
    id: what-happened
    attributes:
      label: 무엇이 일어났나요?
      description: 어떤 문제가 있었는지, 어떤 명령/skill/hook이 관련되어 있었는지 적어주세요.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 재현 절차
      description: 가능하면 명령어와 입력 contract까지 포함해 최소 재현 절차를 적어주세요.
      placeholder: |
        1. `rubrix brief init ./rubrix.json --summary "..." ...`
        2. `rubrix gate ./rubrix.json`
        3. ...
      render: bash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대한 동작
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Rubrix 버전 / 환경
      description: "`rubrix --version`, Node.js 버전, OS를 한 줄로."
      placeholder: "예) rubrix 1.1.1, Node v22.11.0, macOS 26"
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 추가 정보 (선택)
      description: 로그, 스크린샷, 의심되는 원인, 워크어라운드 등.
